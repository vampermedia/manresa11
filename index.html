<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law School Schedule - JD 1-Manresa</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans p-4 md:p-8 selection:bg-indigo-100">
    
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header Section -->
        <header class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="book-open" class="text-indigo-600 w-7 h-7"></i>
                        Law School Schedule
                    </h1>
                    <p class="text-slate-500 mt-2 text-sm md:text-base flex items-center gap-1.5">
                        <i data-lucide="calendar" class="w-4 h-4"></i> JD 1-Manresa
                    </p>
                </div>
                <div class="flex items-center gap-2 text-sm bg-slate-100 px-4 py-2 rounded-full w-fit">
                    <i data-lucide="map-pin" class="text-slate-500 w-4 h-4"></i>
                    <span class="font-medium text-slate-700">Primary Room: D304</span>
                </div>
            </div>
        </header>

        <!-- DESKTOP VIEW: Grid Calendar (Hidden on small screens) -->
        <div class="hidden lg:block bg-white rounded-2xl shadow-sm border border-slate-100 p-6 overflow-hidden relative">
            <div id="desktop-grid-container" class="grid relative" style="grid-template-columns: 80px repeat(5, 1fr); grid-template-rows: 50px repeat(8, 40px);">
                <!-- Grid content will be injected by JavaScript -->
            </div>
        </div>

        <!-- MOBILE VIEW: Day List (Hidden on large screens) -->
        <div id="mobile-list-container" class="lg:hidden space-y-6">
            <!-- Mobile list content will be injected by JavaScript -->
        </div>

        <!-- PROFESSORS SECTION -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 mt-2">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2 mb-6">
                <i data-lucide="users" class="text-indigo-600 w-6 h-6"></i>
                Course Professors
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                
                <!-- Persons and Family Law -->
                <div class="flex items-center gap-4 p-4 rounded-xl border bg-blue-50 border-blue-100">
                    <div class="bg-blue-200 text-blue-700 p-2.5 rounded-lg">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-blue-600 uppercase tracking-wider mb-0.5">Persons and Family Law</p>
                        <p class="font-bold text-blue-900 text-sm">Lydia Galas</p>
                    </div>
                </div>

                <!-- Constitutional Law I -->
                <div class="flex items-center gap-4 p-4 rounded-xl border bg-amber-50 border-amber-100">
                    <div class="bg-amber-200 text-amber-700 p-2.5 rounded-lg">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-amber-600 uppercase tracking-wider mb-0.5">Constitutional Law I</p>
                        <p class="font-bold text-amber-900 text-sm">Kelvin Du</p>
                    </div>
                </div>

                <!-- Criminal Law I -->
                <div class="flex items-center gap-4 p-4 rounded-xl border bg-rose-50 border-rose-100">
                    <div class="bg-rose-200 text-rose-700 p-2.5 rounded-lg">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-rose-600 uppercase tracking-wider mb-0.5">Criminal Law I</p>
                        <p class="font-bold text-rose-900 text-sm">Robert Razon</p>
                    </div>
                </div>

                <!-- Philosophy of Law -->
                <div class="flex items-center gap-4 p-4 rounded-xl border bg-purple-50 border-purple-100">
                    <div class="bg-purple-200 text-purple-700 p-2.5 rounded-lg">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-purple-600 uppercase tracking-wider mb-0.5">Philosophy of Law</p>
                        <p class="font-bold text-purple-900 text-sm">Dominic Estremos</p>
                    </div>
                </div>

                <!-- Legal Research & Writing -->
                <div class="flex items-center gap-4 p-4 rounded-xl border bg-emerald-50 border-emerald-100">
                    <div class="bg-emerald-200 text-emerald-700 p-2.5 rounded-lg">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-emerald-600 uppercase tracking-wider mb-0.5">Legal Research & Writing</p>
                        <p class="font-bold text-emerald-900 text-sm">Jancarlo Quibod</p>
                    </div>
                </div>

                <!-- Ignatian Leadership -->
                <div class="flex items-center gap-4 p-4 rounded-xl border bg-teal-50 border-teal-100">
                    <div class="bg-teal-200 text-teal-700 p-2.5 rounded-lg">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-teal-600 uppercase tracking-wider mb-0.5">Ignatian Leadership</p>
                        <p class="font-bold text-teal-900 text-sm">Alfredo Alpas</p>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        // Schedule Data
        const scheduleData = [
            { id: 1, name: "Persons and Family Law", day: "Mon", start: "17:30", end: "18:30", color: "bg-blue-100 border-blue-300 text-blue-900" },
            { id: 2, name: "Philosophy of Law", day: "Mon", start: "18:30", end: "20:30", color: "bg-purple-100 border-purple-300 text-purple-900" },
            { id: 3, name: "Persons and Family Law", day: "Tue", start: "17:30", end: "18:30", color: "bg-blue-100 border-blue-300 text-blue-900" },
            { id: 4, name: "Legal Research & Writing", day: "Tue", start: "18:30", end: "19:30", color: "bg-emerald-100 border-emerald-300 text-emerald-900" },
            { id: 5, name: "Criminal Law I", day: "Tue", start: "19:30", end: "21:30", color: "bg-rose-100 border-rose-300 text-rose-900" },
            { id: 6, name: "Persons and Family Law", day: "Wed", start: "17:30", end: "18:30", color: "bg-blue-100 border-blue-300 text-blue-900" },
            { id: 7, name: "Constitutional Law I", day: "Wed", start: "18:30", end: "20:30", color: "bg-amber-100 border-amber-300 text-amber-900" },
            { id: 8, name: "Persons and Family Law", day: "Thu", start: "17:30", end: "18:30", color: "bg-blue-100 border-blue-300 text-blue-900" },
            { id: 9, name: "Constitutional Law I", day: "Thu", start: "18:30", end: "20:30", color: "bg-amber-100 border-amber-300 text-amber-900" },
            { id: 10, name: "Ignatian Leadership", day: "Fri", start: "17:30", end: "18:30", color: "bg-teal-100 border-teal-300 text-teal-900" },
            { id: 11, name: "Criminal Law I", day: "Fri", start: "18:30", end: "19:30", color: "bg-rose-100 border-rose-300 text-rose-900" },
            { id: 12, name: "Legal Research & Writing", day: "Fri", start: "19:30", end: "21:30", color: "bg-emerald-100 border-emerald-300 text-emerald-900" }
        ];

        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
        const fullDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

        const timeLabels = [
            { time: "17:30", label: "5:30 PM" },
            { time: "18:00", label: "6:00 PM" },
            { time: "18:30", label: "6:30 PM" },
            { time: "19:00", label: "7:00 PM" },
            { time: "19:30", label: "7:30 PM" },
            { time: "20:00", label: "8:00 PM" },
            { time: "20:30", label: "8:30 PM" },
            { time: "21:00", label: "9:00 PM" },
            { time: "21:30", label: "9:30 PM" }
        ];

        // Helper functions
        const getRowFromTime = (timeStr) => {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const floatTime = hours + (minutes / 60);
            return (floatTime - 17.5) * 2 + 2; 
        };

        const formatTime = (timeStr) => {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const period = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours > 12 ? hours - 12 : hours;
            return `${displayHours}:${minutes === 0 ? '00' : minutes} ${period}`;
        };

        // Determine current day for highlighting
        let currentDayStr = 'Mon';
        const currentDayIndex = new Date().getDay();
        if (currentDayIndex >= 1 && currentDayIndex <= 5) {
            currentDayStr = days[currentDayIndex - 1];
        }

        // --- Render Desktop Grid ---
        const renderDesktop = () => {
            const container = document.getElementById('desktop-grid-container');
            let html = `<div class="border-b border-r border-slate-100"></div>`; // Empty corner

            // Header Days
            days.forEach((day, idx) => {
                const isToday = currentDayStr === day;
                const textColor = isToday ? 'text-indigo-600' : 'text-slate-500';
                html += `<div class="flex items-center justify-center font-semibold text-sm border-b border-slate-100 pb-2 ${textColor}">${fullDays[idx]}</div>`;
            });

            // Grid Lines and Time Labels
            timeLabels.slice(0, -1).forEach((timeObj, idx) => {
                html += `
                    <div class="text-xs text-slate-400 text-right pr-4 relative -top-3" style="grid-column: 1; grid-row: ${idx + 2}">
                        ${timeObj.label}
                    </div>
                    <div class="border-t border-slate-100 z-0" style="grid-column: 2 / -1; grid-row: ${idx + 2}"></div>
                `;
            });

            // Render Classes
            scheduleData.forEach((cls) => {
                const startRow = getRowFromTime(cls.start);
                const endRow = getRowFromTime(cls.end);
                const col = days.indexOf(cls.day) + 2;

                html += `
                    <div class="m-1 rounded-xl p-3 border shadow-sm flex flex-col justify-between hover:shadow-md transition-shadow duration-200 cursor-default z-10 ${cls.color}"
                         style="grid-row: ${startRow} / ${endRow}; grid-column: ${col};">
                        <div>
                            <h3 class="font-bold text-sm leading-tight">${cls.name}</h3>
                            <div class="text-xs mt-1.5 opacity-80 flex items-center gap-1 font-medium">
                                <i data-lucide="clock" class="w-3 h-3"></i> ${formatTime(cls.start)} - ${formatTime(cls.end)}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        };

        // --- Render Mobile List ---
        const renderMobile = () => {
            const container = document.getElementById('mobile-list-container');
            let html = '';

            days.forEach((day, idx) => {
                const dayClasses = scheduleData
                    .filter(cls => cls.day === day)
                    .sort((a, b) => a.start.localeCompare(b.start));

                if (dayClasses.length === 0) return;

                const isToday = currentDayStr === day;
                const headerBg = isToday ? 'bg-indigo-50 border-indigo-100' : 'bg-slate-50 border-slate-100';
                const headerText = isToday ? 'text-indigo-700' : 'text-slate-700';
                const todayBadge = isToday ? `<span class="text-[10px] uppercase tracking-wider font-bold bg-indigo-200 text-indigo-800 px-2 py-0.5 rounded-full">Today</span>` : '';

                html += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="px-5 py-3 border-b flex items-center justify-between ${headerBg}">
                            <h2 class="font-bold ${headerText}">${fullDays[idx]}</h2>
                            ${todayBadge}
                        </div>
                        <div class="divide-y divide-slate-50">
                `;

                dayClasses.forEach((cls) => {
                    const startFormatted = formatTime(cls.start).replace(' PM', '').replace(' AM', '');
                    const endFormatted = formatTime(cls.end).replace(' PM', '').replace(' AM', '');

                    html += `
                        <div class="p-4 flex gap-4 items-start hover:bg-slate-50 transition-colors">
                            <div class="w-16 flex flex-col text-right shrink-0 pt-1">
                                <span class="text-sm font-bold text-slate-700">${startFormatted}</span>
                                <span class="text-xs text-slate-400">${endFormatted}</span>
                            </div>
                            
                            <div class="w-px bg-slate-200 self-stretch relative top-1 rounded-full"></div>
                            
                            <div class="flex-1 rounded-xl p-3 border ${cls.color}">
                                <h3 class="font-bold text-sm">${cls.name}</h3>
                                <div class="flex items-center justify-end mt-2">
                                    <i data-lucide="chevron-right" class="w-3.5 h-3.5 opacity-40"></i>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
        };

        // Initialize and render everything
        document.addEventListener('DOMContentLoaded', () => {
            renderDesktop();
            renderMobile();
            
            // Initialize Lucide icons after HTML is injected
            lucide.createIcons();
        });
    </script>
</body>
</html>
